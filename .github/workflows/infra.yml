name: Provision Azure infra

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION || 'eastus' }}"

      - name: Deploy Bicep
        id: deploy
        run: |
          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters appName="${{ vars.APP_NAME || 'dbservice' }}" \
                         postgresAdminLogin="${{ secrets.POSTGRES_ADMIN_LOGIN }}" \
                         postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --query properties.outputs -o json > outputs.json
          cat outputs.json

      - name: Print next steps
        run: |
          echo "Copy these values into repo Variables/Secrets for the deploy workflow:"
          echo "ACR_NAME            = $(jq -r .acrName.value outputs.json)"
          echo "CONTAINERAPP_ENV    = $(jq -r .containerAppEnvName.value outputs.json)"
          echo "POSTGRES_FQDN       = $(jq -r .postgresFqdn.value outputs.json)"
